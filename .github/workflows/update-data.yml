name: Update Data DSSD

on:
  schedule:
    # Setiap hari jam 07:00 dan 13:00 WITA (00:00 dan 06:00 UTC)
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch: # Bisa dijalankan manual dari GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data dari SIPD e-Walidata
        run: |
          curl -s \
            -H "Cookie: PHPSESSID=${{ secrets.PHPSESSID }}; pemda=${{ secrets.PEMDA_COOKIE }}" \
            -H "X-Requested-With: XMLHttpRequest" \
            -H "Referer: https://sipd.go.id/ewalidata/${{ secrets.SESSION_TOKEN }}/?m=daerah_dashboard&f=keterisian&kodepemda=6403" \
            "https://sipd.go.id/ewalidata/${{ secrets.SESSION_TOKEN }}/?m=daerah_dashboard&f=ajax_list_pemda_keterisian&kodepemda=6403" \
            -o raw_response.json

          # Cek apakah response valid JSON dengan field "data"
          python3 - <<'EOF'
          import json, sys, os
          from datetime import datetime

          with open('raw_response.json') as f:
              content = f.read()

          try:
              data = json.loads(content)
          except:
              print("Response bukan JSON yang valid, skip update.")
              sys.exit(0)

          if 'data' not in data or not isinstance(data['data'], list) or len(data['data']) == 0:
              print("Field 'data' tidak ditemukan atau kosong, skip update.")
              sys.exit(0)

          # Strip field 'skpd' agar file tidak terlalu besar
          for row in data['data']:
              row.pop('skpd', None)

          # Tambahkan metadata
          output = {
              "data": data['data'],
              "meta": {
                  "last_updated": datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S+08:00'),
                  "source": "e-Walidata SIPD",
                  "tahun": "2025",
                  "kodepemda": "6403"
              }
          }

          with open('data/rekap.json', 'w') as f:
              json.dump(output, f, ensure_ascii=False, separators=(',', ':'))

          print(f"Berhasil: {len(data['data'])} urusan diperbarui.")
          EOF

      - name: Commit dan push jika ada perubahan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rekap.json
          git diff --staged --quiet || git commit -m "chore: update data DSSD $(date +'%Y-%m-%d %H:%M') UTC"
          git push

