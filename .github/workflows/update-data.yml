name: Update Data DSSD

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login dan Fetch data SIPD
        env:
          SIPD_USERNAME: ${{ secrets.SIPD_USERNAME }}
          SIPD_PASSWORD: ${{ secrets.SIPD_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import requests, json, sys, re, os
          from datetime import datetime

          USERNAME  = os.environ["SIPD_USERNAME"]
          PASSWORD  = os.environ["SIPD_PASSWORD"]
          KODEPEMDA = "6403"
          DOMAIN    = "beraukab.sipd.kemendagri.go.id"
          TAHUN     = "2025"
          EXCLUDE   = {"3.28","3.29","5.06","5.07"}
          BASE      = "https://sipd.go.id/ewalidata"

          s = requests.Session()
          s.headers.update({
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120",
              "Accept": "application/json, text/javascript, */*; q=0.01",
              "X-Requested-With": "XMLHttpRequest",
              "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
          })

          # Step 1: GET halaman awal untuk init session
          print("=== Step 1: Init session ===")
          r0 = s.get(BASE + "/a/", timeout=30)
          print(f"Status: {r0.status_code}")

          # Step 2: Cari pemda untuk dapat token awal
          print("=== Step 2: Cari pemda ===")
          r1 = s.get(f"{BASE}/a/?m=login&f=list_pemda&q=berau", timeout=30)
          print(f"Status: {r1.status_code}, Response: {r1.text[:200]}")

          # Step 3: Coba berbagai format login
          print("=== Step 3: Login ===")

          # Format A — pakai domain sebagai kodepemda
          payloads = [
              {
                  "m": "login", "f": "proses",
                  "username": USERNAME, "password": PASSWORD,
                  "kodepemda": DOMAIN, "tahun": TAHUN,
              },
              {
                  "m": "login", "f": "proses",
                  "username": USERNAME, "password": PASSWORD,
                  "kodepemda": KODEPEMDA, "tahun": TAHUN,
                  "domain": DOMAIN,
              },
              {
                  "m": "login", "f": "proses",
                  "user": USERNAME, "pass": PASSWORD,
                  "kodepemda": DOMAIN, "tahun": TAHUN,
              },
              {
                  "m": "login", "f": "proses",
                  "username": USERNAME, "password": PASSWORD,
                  "pemda": DOMAIN, "tahun": TAHUN,
              },
          ]

          token = None
          for i, payload in enumerate(payloads):
              print(f"--- Coba format {i+1}: {list(payload.keys())} ---")
              try:
                  r2 = s.post(f"{BASE}/a/", data=payload, timeout=30, allow_redirects=True)
                  print(f"Status: {r2.status_code}, URL: {r2.url}")
                  print(f"Cookies: {dict(s.cookies)}")
                  print(f"Response: {r2.text[:200]}")

                  # Cek apakah berhasil redirect ke dashboard
                  for resp in list(r2.history) + [r2]:
                      m = re.search(r"/ewalidata/([a-f0-9]{40})/", resp.url)
                      if m:
                          token = m.group(1)
                          print(f"TOKEN DITEMUKAN: {token}")
                          break

                  if token:
                      break
              except Exception as e:
                  print(f"Error: {e}")

          if not token:
              print("SEMUA FORMAT GAGAL. Perlu investigasi lebih lanjut.")
              sys.exit(1)

          # Step 4: Set cookie pemda
          import urllib.parse
          pemda_val = urllib.parse.quote(json.dumps({"domain": DOMAIN, "nama": "KAB. BERAU"}))
          s.cookies.set("pemda", pemda_val, domain="sipd.go.id")

          # Step 5: Fetch rekap DSSD
          print("=== Step 4: Fetch data rekap ===")
          url = f"{BASE}/{token}/?m=daerah_dashboard&f=ajax_list_pemda_keterisian&kodepemda={KODEPEMDA}"
          r3 = s.get(url, timeout=30)
          print(f"Status: {r3.status_code}, Response: {r3.text[:300]}")

          try:
              data = r3.json()
          except Exception as e:
              print(f"Bukan JSON: {r3.text[:400]}")
              sys.exit(1)

          if "data" not in data or not data["data"]:
              print(f"Data kosong: {data}")
              sys.exit(1)

          filtered = []
          for row in data["data"]:
              row.pop("skpd", None)
              if row.get("kodeurusan") not in EXCLUDE:
                  filtered.append(row)

          output = {
              "data": filtered,
              "meta": {
                  "last_updated": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S+08:00"),
                  "source": "e-Walidata SIPD",
                  "tahun": TAHUN,
                  "kodepemda": KODEPEMDA,
              }
          }

          with open("data/rekap.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, separators=(",",":"))

          print(f"=== BERHASIL: {len(filtered)} urusan tersimpan ===")
          PYEOF

      - name: Commit dan push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rekap.json
          git diff --staged --quiet || git commit -m "chore: update data DSSD $(date +'%Y-%m-%d %H:%M') UTC"
          git push
