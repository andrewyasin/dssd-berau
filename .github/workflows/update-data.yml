name: Update Data DSSD

on:
  workflow_dispatch:
    inputs:
      json_data:
        description: 'Paste isi JSON dari DevTools SIPD (response ajax_list_pemda_keterisian)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Simpan data baru
        run: |
          python3 << 'PYEOF'
          import json, sys
          from datetime import datetime

          raw = '''${{ github.event.inputs.json_data }}'''

          EXCLUDE = {"3.28","3.29","5.06","5.07","9.01","9.02","9.03","7.02","7.03"}

          try:
              data = json.loads(raw)
          except Exception as e:
              print(f"JSON tidak valid: {e}")
              sys.exit(1)

          rows = data if isinstance(data, list) else data.get("data", [])
          if not rows:
              print("Data kosong!")
              sys.exit(1)

          filtered = [
              {k: v for k, v in row.items() if k != "skpd"}
              for row in rows
              if row.get("kodeurusan") not in EXCLUDE
          ]

          output = {
              "data": filtered,
              "meta": {
                  "last_updated": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S+08:00"),
                  "source": "e-Walidata SIPD",
                  "tahun": "2025",
                  "kodepemda": "6403"
              }
          }

          with open("data/rekap.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, separators=(",",":"))

          print(f"Berhasil: {len(filtered)} urusan disimpan.")
          PYEOF

      - name: Commit dan push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rekap.json
          git diff --staged --quiet || git commit -m "chore: update data DSSD $(date +'%Y-%m-%d %H:%M') UTC"
          git push
