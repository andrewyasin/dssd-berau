name: Update Data DSSD

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data dari SIPD e-Walidata
        run: |
          curl -s \
            -H "Cookie: PHPSESSID=${{ secrets.PHPSESSID }}; pemda=${{ secrets.PEMDA_COOKIE }}" \
            -H "X-Requested-With: XMLHttpRequest" \
            -H "Referer: https://sipd.go.id/ewalidata/${{ secrets.SESSION_TOKEN }}/?m=daerah_dashboard&f=keterisian&kodepemda=6403" \
            "https://sipd.go.id/ewalidata/${{ secrets.SESSION_TOKEN }}/?m=daerah_dashboard&f=ajax_list_pemda_keterisian&kodepemda=6403" \
            -o raw_response.json

          python3 - <<'EOF'
          import json, sys
          from datetime import datetime

          with open('raw_response.json') as f:
              content = f.read()

          try:
              data = json.loads(content)
          except:
              print("Response bukan JSON valid, skip.")
              sys.exit(0)

          if 'data' not in data or not isinstance(data['data'], list) or len(data['data']) == 0:
              print("Data kosong atau tidak valid, skip.")
              sys.exit(0)

          # Kode urusan yang tidak ditangani Pemkab Berau
          EXCLUDE_KODE = {'3.28', '3.29', '5.06', '5.07'}

          filtered = []
          for row in data['data']:
              row.pop('skpd', None)
              if row.get('kodeurusan') not in EXCLUDE_KODE:
                  filtered.append(row)

          output = {
              "data": filtered,
              "meta": {
                  "last_updated": datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S+08:00'),
                  "source": "e-Walidata SIPD",
                  "tahun": "2025",
                  "kodepemda": "6403"
              }
          }

          with open('data/rekap.json', 'w') as f:
              json.dump(output, f, ensure_ascii=False, separators=(',', ':'))

          print(f"Berhasil: {len(filtered)} urusan tersimpan (dari {len(data['data'])} total).")
          EOF

      - name: Commit dan push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rekap.json
          git diff --staged --quiet || git commit -m "chore: update data DSSD $(date +'%Y-%m-%d %H:%M') UTC"
          git push
