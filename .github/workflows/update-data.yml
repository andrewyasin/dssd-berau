name: Update Data DSSD

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login dan Fetch data SIPD
        env:
          SIPD_USERNAME: ${{ secrets.SIPD_USERNAME }}
          SIPD_PASSWORD: ${{ secrets.SIPD_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import requests, json, sys, re, os
          from datetime import datetime

          USERNAME  = os.environ["SIPD_USERNAME"]
          PASSWORD  = os.environ["SIPD_PASSWORD"]
          KODEPEMDA = "6403"
          TAHUN     = "2025"
          EXCLUDE   = {"3.28","3.29","5.06","5.07"}
          BASE      = "https://sipd.go.id/ewalidata"

          s = requests.Session()
          s.headers.update({
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120",
              "Accept": "application/json, text/javascript, */*; q=0.01",
              "X-Requested-With": "XMLHttpRequest",
          })

          # Step 1: GET halaman awal
          print("=== Step 1: Akses halaman awal ===")
          try:
              r0 = s.get(BASE + "/", timeout=30)
              print(f"Status: {r0.status_code}, URL: {r0.url}")
          except Exception as e:
              print(f"Error: {e}")

          # Step 2: Cari pemda
          print("=== Step 2: Cari pemda ===")
          try:
              r1 = s.get(BASE + "/a/?m=login&f=list_pemda&q=berau", timeout=30)
              print(f"Status: {r1.status_code}")
              print(f"Response: {r1.text[:300]}")
          except Exception as e:
              print(f"Error: {e}")

          # Step 3: Login POST
          print("=== Step 3: Login ===")
          payload = {
              "m": "login", "f": "proses",
              "username": USERNAME, "password": PASSWORD,
              "kodepemda": KODEPEMDA, "tahun": TAHUN,
          }
          try:
              r2 = s.post(BASE + "/a/", data=payload, timeout=30, allow_redirects=True)
              print(f"Status: {r2.status_code}, URL akhir: {r2.url}")
              print(f"Cookies: {dict(s.cookies)}")
              print(f"Response: {r2.text[:400]}")
          except Exception as e:
              print(f"Error login: {e}")
              sys.exit(1)

          # Cari session token dari URL
          token = None
          for resp in list(r2.history) + [r2]:
              m = re.search(r"/ewalidata/([a-f0-9]{40})/", resp.url)
              if m:
                  token = m.group(1)
                  print(f"Token: {token}")
                  break

          if not token:
              print("GAGAL: session token tidak ditemukan. Login gagal.")
              sys.exit(1)

          # Step 4: Set cookie pemda
          s.cookies.set(
              "pemda",
              "%7B%22domain%22%3A%22beraukab.sipd.kemendagri.go.id%22%2C%22nama%22%3A%22KAB.+BERAU%22%7D",
              domain="sipd.go.id"
          )

          # Step 5: Fetch rekap DSSD
          print("=== Step 4: Fetch data rekap ===")
          url = f"{BASE}/{token}/?m=daerah_dashboard&f=ajax_list_pemda_keterisian&kodepemda={KODEPEMDA}"
          try:
              r3 = s.get(url, timeout=30)
              print(f"Status: {r3.status_code}")
              print(f"Response: {r3.text[:300]}")
          except Exception as e:
              print(f"Error fetch: {e}")
              sys.exit(1)

          # Step 6: Parse JSON
          try:
              data = r3.json()
          except Exception as e:
              print(f"Bukan JSON: {e} | Raw: {r3.text[:400]}")
              sys.exit(1)

          if "data" not in data or not data["data"]:
              print(f"Data kosong: {data}")
              sys.exit(1)

          filtered = []
          for row in data["data"]:
              row.pop("skpd", None)
              if row.get("kodeurusan") not in EXCLUDE:
                  filtered.append(row)

          output = {
              "data": filtered,
              "meta": {
                  "last_updated": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S+08:00"),
                  "source": "e-Walidata SIPD",
                  "tahun": TAHUN,
                  "kodepemda": KODEPEMDA,
              }
          }

          with open("data/rekap.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, separators=(",",":"))

          print(f"=== BERHASIL: {len(filtered)} urusan tersimpan ===")
          PYEOF

      - name: Commit dan push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rekap.json
          git diff --staged --quiet || git commit -m "chore: update data DSSD $(date +'%Y-%m-%d %H:%M') UTC"
          git push
