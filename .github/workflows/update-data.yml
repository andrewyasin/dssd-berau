name: Update Data DSSD

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4 --quiet

      - name: Login dan Fetch data SIPD
        env:
          SIPD_USERNAME: ${{ secrets.SIPD_USERNAME }}
          SIPD_PASSWORD: ${{ secrets.SIPD_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import requests, json, sys, re, os
          from datetime import datetime
          from bs4 import BeautifulSoup

          USERNAME  = os.environ["SIPD_USERNAME"]
          PASSWORD  = os.environ["SIPD_PASSWORD"]
          SUBDOMAIN = "beraukab.sipd.kemendagri.go.id"
          KODEPEMDA = "6403"
          TAHUN     = "2025"
          EXCLUDE   = {"3.28","3.29","5.06","5.07"}
          BASE      = "https://sipd.go.id"

          def make_session():
              s = requests.Session()
              s.headers.update({
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
                  "Accept-Language": "id-ID,id;q=0.9",
              })
              return s

          def get_login_form(s):
              r = s.get(f"{BASE}/ewalidata/a/", timeout=30)
              soup = BeautifulSoup(r.text, "html.parser")
              form = soup.find("form", id="loginform") or soup.find("form")
              if not form:
                  return None, None, None, None
              action = form.get("action", f"{BASE}/ewalidata/a/")
              if action.startswith("/"):
                  action = BASE + action
              csrf = (form.find("input", {"name": "_token"}) or {}).get("value", "")
              # Ambil semua option tahun
              sel = form.find("select", {"name": "tahun"})
              tahun = TAHUN
              if sel:
                  for o in sel.find_all("option"):
                      if o.get("value","") == TAHUN:
                          tahun = TAHUN
                          break
                  else:
                      opts = sel.find_all("option")
                      if opts: tahun = opts[0].get("value", TAHUN)
              return action, csrf, tahun, soup

          def try_login(s, action, csrf, tahun, extra_fields={}):
              payload = {
                  "subdomain": SUBDOMAIN,
                  "username":  USERNAME,
                  "user":      USERNAME,
                  "password":  PASSWORD,
                  "tahun":     tahun,
                  "_token":    csrf,
                  "submit":    "1",
              }
              payload.update(extra_fields)
              s.headers.update({
                  "Content-Type": "application/x-www-form-urlencoded",
                  "Referer": f"{BASE}/ewalidata/a/",
                  "Origin":  BASE,
                  "Accept":  "text/html,application/xhtml+xml,*/*;q=0.9",
              })
              r = s.post(action, data=payload, timeout=30, allow_redirects=True)
              print(f"  POST status: {r.status_code}, URL: {r.url}")
              print(f"  Cookies: {dict(s.cookies)}")
              # Cek apakah title adalah dashboard (bukan login)
              title_m = re.search(r"<title>(.*?)</title>", r.text, re.IGNORECASE)
              title = title_m.group(1) if title_m else "?"
              print(f"  Title: {title}")
              # Cari session token dari URL history
              for resp in list(r.history) + [r]:
                  m = re.search(r"/ewalidata/([a-f0-9]{40})/", resp.url)
                  if m:
                      token = m.group(1)
                      # Validasi: visit dashboard dan cek title
                      s.headers.update({"Accept": "text/html,*/*;q=0.9"})
                      rd = s.get(f"{BASE}/ewalidata/{token}/?m=daerah_dashboard", timeout=30)
                      td = re.search(r"<title>(.*?)</title>", rd.text, re.IGNORECASE)
                      td_title = td.group(1) if td else "?"
                      print(f"  Dashboard title: {td_title}")
                      if "Login" not in td_title and "login" not in td_title:
                          print(f"  LOGIN BERHASIL! Token: {token}")
                          return token, s
              return None, s

          # ── Percobaan login ──
          session_token = None

          # Percobaan 1: field standar
          print("=== Percobaan 1: field standar ===")
          s = make_session()
          action, csrf, tahun, _ = get_login_form(s)
          print(f"Action: {action}, CSRF: {csrf[:15]}..., Tahun: {tahun}")
          session_token, s = try_login(s, action, csrf, tahun)

          # Percobaan 2: tanpa field 'user', hanya 'username'
          if not session_token:
              print("=== Percobaan 2: hanya field username ===")
              s = make_session()
              action, csrf, tahun, _ = get_login_form(s)
              session_token, s = try_login(s, action, csrf, tahun, {"user": ""})

          # Percobaan 3: username lowercase admin6403
          if not session_token:
              print("=== Percobaan 3: username admin6403 hardcode ===")
              s = make_session()
              action, csrf, tahun, _ = get_login_form(s)
              session_token, s = try_login(s, action, csrf, tahun, {
                  "username": "admin6403", "user": "admin6403"
              })

          # Percobaan 4: POST ke URL berbeda (langsung ke session token URL)
          if not session_token:
              print("=== Percobaan 4: POST ke action URL dengan tahun 2026 ===")
              s = make_session()
              action, csrf, tahun, soup = get_login_form(s)
              # Coba dengan tahun 2026 (dari log sebelumnya tahun yg muncul adalah 2026)
              session_token, s = try_login(s, action, csrf, "2026")

          if not session_token:
              print("SEMUA PERCOBAAN GAGAL.")
              sys.exit(1)

          # ── Fetch rekap DSSD ──
          print(f"=== Fetch rekap DSSD dengan token: {session_token} ===")
          s.headers.update({
              "Accept": "application/json, text/javascript, */*; q=0.01",
              "X-Requested-With": "XMLHttpRequest",
              "Referer": f"{BASE}/ewalidata/{session_token}/?m=daerah_dashboard&f=keterisian&kodepemda={KODEPEMDA}",
          })
          s.headers.pop("Content-Type", None)

          ts = int(datetime.now().timestamp() * 1000)
          url = f"{BASE}/ewalidata/{session_token}/?m=daerah_dashboard&f=ajax_list_pemda_keterisian&kodepemda={KODEPEMDA}&_={ts}"
          r = s.get(url, timeout=30)
          print(f"Status: {r.status_code}, Response: {r.text[:200]}")

          try:
              data = r.json()
          except:
              print(f"Bukan JSON: {r.text[:400]}")
              sys.exit(1)

          if "data" not in data or not data["data"]:
              print(f"Data kosong: {str(data)[:200]}")
              sys.exit(1)

          filtered = [
              {k:v for k,v in row.items() if k != "skpd"}
              for row in data["data"]
              if row.get("kodeurusan") not in EXCLUDE
          ]

          output = {
              "data": filtered,
              "meta": {
                  "last_updated": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S+08:00"),
                  "source": "e-Walidata SIPD",
                  "tahun": TAHUN,
                  "kodepemda": KODEPEMDA,
              }
          }
          with open("data/rekap.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, separators=(",",":"))

          print(f"=== BERHASIL: {len(filtered)} urusan tersimpan ===")
          PYEOF

      - name: Commit dan push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rekap.json
          git diff --staged --quiet || git commit -m "chore: update data DSSD $(date +'%Y-%m-%d %H:%M') UTC"
          git push
