name: Update Data DSSD

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4 --quiet

      - name: Login dan Fetch data SIPD
        env:
          SIPD_USERNAME: ${{ secrets.SIPD_USERNAME }}
          SIPD_PASSWORD: ${{ secrets.SIPD_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import requests, json, sys, re, os
          from datetime import datetime
          from bs4 import BeautifulSoup

          USERNAME  = os.environ["SIPD_USERNAME"]
          PASSWORD  = os.environ["SIPD_PASSWORD"]
          SUBDOMAIN = "beraukab.sipd.kemendagri.go.id"
          KODEPEMDA = "6403"
          TAHUN     = "2025"
          EXCLUDE   = {"3.28","3.29","5.06","5.07"}
          BASE      = "https://sipd.go.id"

          s = requests.Session()
          s.headers.update({
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "id-ID,id;q=0.9",
          })

          # Step 1: GET halaman login
          print("=== Step 1: Ambil halaman login ===")
          r0 = s.get(f"{BASE}/ewalidata/a/", timeout=30)
          print(f"Status: {r0.status_code}, URL: {r0.url}")

          soup = BeautifulSoup(r0.text, "html.parser")
          form = soup.find("form", id="loginform") or soup.find("form")
          if not form:
              print("Form tidak ditemukan!")
              sys.exit(1)

          action     = form.get("action", "")
          csrf_token = (form.find("input", {"name": "_token"}) or {}).get("value", "")
          print(f"Action: {action}")
          print(f"CSRF: {csrf_token[:20]}...")

          # Ambil tahun pertama dari select
          tahun_sel = form.find("select", {"name": "tahun"})
          tahun_val = TAHUN
          if tahun_sel:
              opts = tahun_sel.find_all("option")
              # Cari option yang valuenya 2025
              for o in opts:
                  if o.get("value","") == TAHUN:
                      tahun_val = TAHUN
                      break
              else:
                  if opts:
                      tahun_val = opts[0].get("value", TAHUN)
          print(f"Tahun: {tahun_val}")

          # Step 2: POST login
          print("=== Step 2: Login ===")
          login_url = f"{BASE}{action}" if action.startswith("/") else (action if action.startswith("http") else f"{BASE}/ewalidata/a/")
          print(f"Login URL: {login_url}")

          s.headers.update({
              "Content-Type": "application/x-www-form-urlencoded",
              "Referer": f"{BASE}/ewalidata/a/",
              "Origin": BASE,
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
          })

          payload = {
              "subdomain": SUBDOMAIN,
              "username":  USERNAME,
              "user":      USERNAME,
              "password":  PASSWORD,
              "tahun":     tahun_val,
              "_token":    csrf_token,
              "submit":    "1",
          }

          r1 = s.post(login_url, data=payload, timeout=30, allow_redirects=True)
          print(f"Status: {r1.status_code}, URL akhir: {r1.url}")
          print(f"Semua cookies setelah login: {dict(s.cookies)}")

          # Cari session token
          session_token = None
          for resp in list(r1.history) + [r1]:
              m = re.search(r"/ewalidata/([a-f0-9]{40})/", resp.url)
              if m:
                  session_token = m.group(1)
                  print(f"Session token: {session_token}")
                  break
          if not session_token:
              m2 = re.search(r"/ewalidata/([a-f0-9]{40})/", r1.text)
              if m2:
                  session_token = m2.group(1)
                  print(f"Session token (dari HTML): {session_token}")

          if not session_token:
              print("GAGAL: session token tidak ditemukan")
              sys.exit(1)

          # Step 3: GET dashboard dulu untuk memastikan session aktif
          print("=== Step 3: Aktivasi session via dashboard ===")
          s.headers.update({
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Referer": f"{BASE}/ewalidata/{session_token}/",
          })
          r_dash = s.get(f"{BASE}/ewalidata/{session_token}/?m=daerah_dashboard", timeout=30)
          print(f"Dashboard status: {r_dash.status_code}")
          print(f"Dashboard title: {re.search(r'<title>(.*?)</title>', r_dash.text, re.IGNORECASE).group(1) if re.search(r'<title>(.*?)</title>', r_dash.text, re.IGNORECASE) else 'tidak ditemukan'}")
          print(f"Cookies setelah dashboard: {dict(s.cookies)}")

          # Step 4: Fetch rekap DSSD
          print("=== Step 4: Fetch rekap DSSD ===")
          s.headers.update({
              "Accept": "application/json, text/javascript, */*; q=0.01",
              "X-Requested-With": "XMLHttpRequest",
              "Referer": f"{BASE}/ewalidata/{session_token}/?m=daerah_dashboard&f=keterisian&kodepemda={KODEPEMDA}",
              "Content-Type": None,
          })
          # Hapus Content-Type agar tidak interferensi
          s.headers.pop("Content-Type", None)

          fetch_url = f"{BASE}/ewalidata/{session_token}/?m=daerah_dashboard&f=ajax_list_pemda_keterisian&kodepemda={KODEPEMDA}&_={int(datetime.now().timestamp()*1000)}"
          print(f"Fetch URL: {fetch_url}")
          r2 = s.get(fetch_url, timeout=30)
          print(f"Status: {r2.status_code}")
          print(f"Response (300 char): {r2.text[:300]}")

          try:
              data = r2.json()
          except Exception as e:
              print(f"Bukan JSON: {e}")
              sys.exit(1)

          if "data" not in data or not data["data"]:
              print(f"Data kosong: {str(data)[:300]}")
              sys.exit(1)

          # Step 5: Simpan
          filtered = []
          for row in data["data"]:
              row.pop("skpd", None)
              if row.get("kodeurusan") not in EXCLUDE:
                  filtered.append(row)

          output = {
              "data": filtered,
              "meta": {
                  "last_updated": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S+08:00"),
                  "source": "e-Walidata SIPD",
                  "tahun": TAHUN,
                  "kodepemda": KODEPEMDA,
              }
          }

          with open("data/rekap.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, separators=(",",":"))

          print(f"=== BERHASIL: {len(filtered)} urusan tersimpan ===")
          PYEOF

      - name: Commit dan push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rekap.json
          git diff --staged --quiet || git commit -m "chore: update data DSSD $(date +'%Y-%m-%d %H:%M') UTC"
          git push
