<body>

    <header>
        <div class="header-container">
            <div class="brand-title">
                <i class="fa-solid fa-chart-pie"></i>
                <div>
                    <h1>Rekap DSSD e-Walidata</h1>
                    <p>Kabupaten Berau, Kalimantan Timur</p>
                </div>
            </div>
            <div class="year-switcher">
                <button class="year-btn" onclick="switchYear('2023')">2023</button>
                <button class="year-btn" onclick="switchYear('2024')">2024</button>
                <button class="year-btn active" onclick="switchYear('2025')">2025</button>
            </div>
        </div>
    </header>

    <main>
        <div class="controls-card">
            <div class="filter-group">
                <button class="filter-btn active" onclick="setFilter('all', this)">Semua</button>
                <button class="filter-btn" onclick="setFilter('100', this)">100%</button>
                <button class="filter-btn" onclick="setFilter('gte50', this)">&ge; 50%</button>
                <button class="filter-btn" onclick="setFilter('lt50', this)">&lt; 50%</button>
                <button class="filter-btn" onclick="setFilter('0', this)">0%</button>
            </div>
            <div class="search-group">
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cari nama urusan..." oninput="handleSearch()">
                </div>
                <div class="export-group">
                    <button class="btn-export" onclick="exportExcel()" title="Export ke Excel"><i class="fa-solid fa-file-excel"></i> Excel</button>
                    <button class="btn-export" onclick="exportCSV()" title="Export ke CSV"><i class="fa-solid fa-file-csv"></i> CSV</button>
                    <button class="btn-export" onclick="exportPDF()" title="Export ke PDF"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                </div>
            </div>
        </div>

        <div id="contentArea">
            <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat data...</div>
        </div>
    </main>

    <footer>
        &copy; 2026 Diskominfo Kabupaten Berau &bull; Bidang Persandian dan Statistik
    </footer>

    <script>
        const EXCLUDED_CODES = ['3.28', '3.29', '5.06', '5.07', '9.01', '9.02', '9.03', '7.02', '7.03'];
        let currentYear = '2025';
        let rawData = [];
        let filteredData = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let sortColumn = 'kodeurusan';
        let sortAsc = true;

        async function loadData(year) {
            currentYear = year;
            document.querySelectorAll('.year-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.trim() === year);
            });

            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat data tahun ' + year + '...</div>';

            let fileUrl = 'data/rekap.json';
            if (year === '2023') fileUrl = 'data/rekap-2023.json';
            if (year === '2024') fileUrl = 'data/rekap-2024.json';

            try {
                const response = await fetch(fileUrl);
                if (!response.ok) throw new Error('Gagal memuat file data');
                const json = await response.json();
                
                // Handle struktur data yang mungkin berbeda (array langsung atau object dengan property)
                rawData = Array.isArray(json) ? json : (json.data || json.rekap || []);
                
                // Filter urusan yang dikecualikan
                rawData = rawData.filter(item => !EXCLUDED_CODES.includes(String(item.kodeurusan).trim()));

                applyFilterAndSearch();
            } catch (error) {
                console.error(error);
                contentArea.innerHTML = '<div class="error-state"><i class="fa-solid fa-triangle-exclamation" style="font-size: 2rem; color: #EAB308; margin-bottom: 0.5rem;"></i><br>Gagal memuat data untuk tahun ' + year + '. Pastikan file data tersedia.</div>';
            }
        }

        function switchYear(year) {
            loadData(year);
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilterAndSearch();
        }

        function handleSearch() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase();
            applyFilterAndSearch();
        }

        function sortData(column) {
            if (sortColumn === column) {
                sortAsc = !sortAsc;
            } else {
                sortColumn = column;
                sortAsc = true;
            }
            applyFilterAndSearch();
        }

        function applyFilterAndSearch() {
            filteredData = rawData.filter(item => {
                const name = (item.namaurusan || '').toLowerCase();
                const code = String(item.kodeurusan || '');
                const matchesSearch = name.includes(currentSearch) || code.includes(currentSearch);

                if (!matchesSearch) return false;

                const jml = parseInt(item.ssd_jml) || 0;
                const terisi = parseInt(item.ssd_terisi) || 0;
                const pct = jml > 0 ? (terisi / jml) * 100 : 0;

                if (currentFilter === '100') return pct === 100;
                if (currentFilter === 'gte50') return pct >= 50;
                if (currentFilter === 'lt50') return pct < 50 && pct > 0;
                if (currentFilter === '0') return pct === 0;
                return true;
            });

            // Sorting
            filteredData.sort((a, b) => {
                let valA = a[sortColumn];
                let valB = b[sortColumn];

                if (sortColumn === 'kodeurusan' || sortColumn.startsWith('ssd_')) {
                    valA = parseFloat(valA) || 0;
                    valB = parseFloat(valB) || 0;
                } else {
                    valA = String(valA || '').toLowerCase();
                    valB = String(valB || '').toLowerCase();
                }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });

            renderUI();
        }

        function renderUI() {
            const contentArea = document.getElementById('contentArea');
            if (filteredData.length === 0) {
                contentArea.innerHTML = '<div class="error-state">Tidak ada data yang sesuai dengan filter atau pencarian.</div>';
                return;
            }

            let html = '';

            // Desktop Table View
            html += '<div class="table-container"><table><thead><tr>';
            html += '<th onclick="sortData(\\'kodeurusan\\')">Kode <i class="fa-solid fa-sort"></i></th>';
            html += '<th onclick="sortData(\\'namaurusan\\')">Nama Urusan <i class="fa-solid fa-sort"></i></th>';
            html += '<th onclick="sortData(\\'ssd_jml\\')">Jml DSSD <i class="fa-solid fa-sort"></i></th>';
            html += '<th onclick="sortData(\\'ssd_terisi\\')">Terisi <i class="fa-solid fa-sort"></i></th>';
            html += '<th onclick="sortData(\\'ssd_tidakterisi\\')">Belum <i class="fa-solid fa-sort"></i></th>';
            html += '<th onclick="sortData(\\'ssd_digunakan\\')">Digunakan <i class="fa-solid fa-sort"></i></th>';
            html += '<th onclick="sortData(\\'ssd_ver_walidata\\')">Ver. Walidata <i class="fa-solid fa-sort"></i></th>';
            html += '<th onclick="sortData(\\'ssd_ver_pembina\\')">Ver. Pembina <i class="fa-solid fa-sort"></i></th>';
            html += '<th onclick="sortData(\\'ssd_final\\')">Final <i class="fa-solid fa-sort"></i></th>';
            html += '<th>Capaian</th>';
            html += '</tr></thead><tbody>';

            filteredData.forEach(item => {
                const jml = parseInt(item.ssd_jml) || 0;
                const terisi = parseInt(item.ssd_terisi) || 0;
                const pct = jml > 0 ? Math.round((terisi / jml) * 100) : 0;
                
                let badgeClass = 'progress-low';
                if (pct === 100) badgeClass = 'progress-high';
                else if (pct >= 50) badgeClass = 'progress-med';

                html += `<tr>
                    <td><strong>${item.kodeurusan || '-'}</strong></td>
                    <td>${item.namaurusan || '-'}</td>
                    <td>${item.ssd_jml || 0}</td>
                    <td>${item.ssd_terisi || 0}</td>
                    <td>${item.ssd_tidakterisi || 0}</td>
                    <td>${item.ssd_digunakan || 0}</td>
                    <td>${item.ssd_ver_walidata || 0}</td>
                    <td>${item.ssd_ver_pembina || 0}</td>
                    <td>${item.ssd_final || 0}</td>
                    <td><span class="badge-progress ${badgeClass}">${pct}%</span></td>
                </tr>`;
            });
            html += '</tbody></table></div>';

            // Mobile Card View
            html += '<div class="card-grid">';
            filteredData.forEach(item => {
                const jml = parseInt(item.ssd_jml) || 0;
                const terisi = parseInt(item.ssd_terisi) || 0;
                const pct = jml > 0 ? Math.round((terisi / jml) * 100) : 0;
                
                let badgeClass = 'progress-low';
                if (pct === 100) badgeClass = 'progress-high';
                else if (pct >= 50) badgeClass = 'progress-med';

                html += `<div class="urusan-card">
                    <div class="urusan-card-header">
                        <span class="urusan-code">${item.kodeurusan || '-'}</span>
                        <span class="badge-progress ${badgeClass}">${pct}% Terisi</span>
                    </div>
                    <div class="urusan-name">${item.namaurusan || '-'}</div>
                    <div class="urusan-stats-grid">
                        <div class="stat-item"><span class="stat-label">Total</span><span class="stat-val">${item.ssd_jml || 0}</span></div>
                        <div class="stat-item"><span class="stat-label">Terisi</span><span class="stat-val" style="color: #166534;">${item.ssd_terisi || 0}</span></div>
                        <div class="stat-item"><span class="stat-label">Belum</span><span class="stat-val" style="color: #991B1B;">${item.ssd_tidakterisi || 0}</span></div>
                    </div>
                </div>`;
            });
            html += '</div>';

            contentArea.innerHTML = html;
        }

        // Export Functions
        function getExportData() {
            return filteredData.map(item => ({
                "Kode Urusan": item.kodeurusan || '',
                "Nama Urusan": item.namaurusan || '',
                "Jumlah DSSD": parseInt(item.ssd_jml) || 0,
                "Terisi": parseInt(item.ssd_terisi) || 0,
                "Tidak Terisi": parseInt(item.ssd_tidakterisi) || 0,
                "Digunakan": parseInt(item.ssd_digunakan) || 0,
                "Disabled": parseInt(item.ssd_disabled) || 0,
                "Verifikasi Walidata": parseInt(item.ssd_ver_walidata) || 0,
                "Verifikasi Pembina": parseInt(item.ssd_ver_pembina) || 0,
                "Final": parseInt(item.ssd_final) || 0
            }));
        }

        function exportExcel() {
            if (filteredData.length === 0) {
                alert('Tidak ada data untuk diexport.');
                return;
            }
            const data = getExportData();
            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Rekap DSSD");
            XLSX.writeFile(workbook, `Rekap_DSSD_Berau_${currentYear}.xlsx`);
        }

        function exportCSV() {
            if (filteredData.length === 0) {
                alert('Tidak ada data untuk diexport.');
                return;
            }
            const data = getExportData();
            const worksheet = XLSX.utils.json_to_sheet(data);
            const csvOutput = XLSX.utils.sheet_to_csv(worksheet);
            const blob = new Blob([csvOutput], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.setAttribute('download', `Rekap_DSSD_Berau_${currentYear}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function exportPDF() {
            if (filteredData.length === 0) {
                alert('Tidak ada data untuk diexport.');
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape', 'mm', 'a4');

            doc.setFontSize(16);
            doc.setTextColor(19, 77, 34);
            doc.text(`Rekap DSSD e-Walidata Kabupaten Berau - Tahun ${currentYear}`, 14, 15);

            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text(`Dicetak pada: ${new Date().toLocaleDateString('id-ID')}`, 14, 22);

            const tableHeaders = ['Kode', 'Nama Urusan', 'Jml', 'Terisi', 'Belum', 'Digunakan', 'Walidata', 'Pembina', 'Final'];
            const tableRows = filteredData.map(item => [
                item.kodeurusan || '',
                item.namaurusan || '',
                item.ssd_jml || 0,
                item.ssd_terisi || 0,
                item.ssd_tidakterisi || 0,
                item.ssd_digunakan || 0,
                item.ssd_ver_walidata || 0,
                item.ssd_ver_pembina || 0,
                item.ssd_final || 0
            ]);

            doc.autoTable({
                head: [tableHeaders],
                body: tableRows,
                startY: 28,
                theme: 'grid',
                headStyles: { fillColor: [19, 77, 34], textColor: [255, 255, 255], fontStyle: 'bold' },
                styles: { fontSize: 9, cellPadding: 3 },
                columnStyles: {
                    0: { cellWidth: 15 },
                    1: { cellWidth: 'auto' },
                    2: { cellWidth: 15, halign: 'center' },
                    3: { cellWidth: 15, halign: 'center' },
                    4: { cellWidth: 15, halign: 'center' },
                    5: { cellWidth: 20, halign: 'center' },
                    6: { cellWidth: 20, halign: 'center' },
                    7: { cellWidth: 20, halign: 'center' },
                    8: { cellWidth: 15, halign: 'center' }
                }
            });

            doc.save(`Rekap_DSSD_Berau_${currentYear}.pdf`);
        }

        // Init load
        loadData('2025');
    </script>
</body>
</html>
"""

with open('index.html', 'w', encoding='utf-8') as f:
    f.write(html_content)
